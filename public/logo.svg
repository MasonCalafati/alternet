<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Circuit node icon: rounded square body + 4 corner traces with endpoint nodes -->

  <!-- Corner traces (L-shaped paths) -->
  <path d="M 32 26 L 24 26 L 24 18" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 68 26 L 76 26 L 76 18" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 32 74 L 24 74 L 24 82" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 68 74 L 76 74 L 76 82" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Endpoint circles -->
  <circle cx="24" cy="18" r="5" fill="white"/>
  <circle cx="76" cy="18" r="5" fill="white"/>
  <circle cx="24" cy="82" r="5" fill="white"/>
  <circle cx="76" cy="82" r="5" fill="white"/>

  <!-- Main body: solid white rounded square -->
  <rect x="29" y="29" width="42" height="42" rx="9" ry="9" fill="white"/>
</svg>
